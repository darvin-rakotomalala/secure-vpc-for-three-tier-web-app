name: Checkov Security Scan → S3

# Controls when the workflow will run
on:
  push:
    branches: [ "*" ]
    paths-ignore:
      - '**.json'
      - '**.md'
      - '**.jpg'
      - 'Documentation/**'
      - 'AWS services study note/**'
      - 'Screenshot verification/**'
    # paths:
    # - terraform/**
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '**.json'
      - '**.jpg'
      - 'Documentation/**'
      - 'AWS services study note/**'
      - 'Screenshot verification/**'
    # paths:
    # - terraform/**
    # schedule:
    # - cron: '0 0 * * 0'  # Weekly scan
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write         # Required for requesting the OIDC JWT
  contents: read          # Required for actions/checkout
  security-events: write  # for github/codeql-action/upload-sarif to upload SARIF results
  actions: read           # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
  pull-requests: write    # Required for plan comments
  issues: write

env:
  # Force all JavaScript actions to run on Node.js 24 to silence Node 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # verbosity setting for Terraform logs
  TF_LOG: INFO
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  TF_BACKEND_S3_BUCKET: ${{ vars.TF_BACKEND_S3_BUCKET }}
  TF_VERSION: ${{ vars.TF_VERSION }}
  # WORKING_DIR: './terraform'

  # ── Customize these ────────────────────────────────────────────────────────
  CHECKOV_S3_BUCKET: ${{ vars.CHECKOV_S3_BUCKET }}  # e.g. checkov-static-analysis-scan-69127
  CHECKOV_DIRECTORY: "."                            # Directory to scan
  # ───────────────────────────────────────────────────────────────────────────

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "scan"
  checkov-scan:
    name: Run Checkov & Upload to S3
    environment: dev
    # defaults:
    # run:
    # working-directory: ${{ env.WORKING_DIR }}
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
        # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

        # ── 2. Authenticate to AWS (OIDC — no long-lived keys) ─────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

        # ── 3. Set up Python & install Checkov ─────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install checkov

        # ── 4. Run Checkov ─────────────────────────────────────────────────────
      - name: Run Checkov scan
        id: checkov
        # continue-on-error so the upload step always runs even when findings exist
        continue-on-error: true
        run: |
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          RUN_ID="${{ github.run_id }}"
          REPORT_DIR="checkov-reports"
          mkdir -p "$REPORT_DIR"
        
          checkov \
            --directory "${{ env.CHECKOV_DIRECTORY }}" \
            --output cli \
            --output junitxml \
            --output json \
            --output-file-path "$REPORT_DIR" \
            --soft-fail \
            2>&1 | tee "$REPORT_DIR/checkov.log"
        
          # Rename outputs to include timestamp + run-id for easy S3 sorting
          for f in "$REPORT_DIR"/*; do
            base=$(basename "$f")
            mv "$f" "$REPORT_DIR/${TIMESTAMP}_run${RUN_ID}_${base}"
          done
        
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "report_dir=$REPORT_DIR" >> "$GITHUB_OUTPUT"

        # ── 5. Upload reports to S3 ────────────────────────────────────────────
      - name: Upload Checkov reports to S3
        run: |
          REPORT_DIR="${{ steps.checkov.outputs.report_dir }}"
          TIMESTAMP="${{ steps.checkov.outputs.timestamp }}"
          S3_PATH="${{ env.CHECKOV_S3_BUCKET }}"
          
          echo "Uploading reports to $S3_PATH"
          aws s3 cp "$REPORT_DIR/" s3://${{ env.CHECKOV_S3_BUCKET }}/ \
            --recursive \
            --storage-class STANDARD_IA \
            --metadata \
              "git-sha=${{ github.sha }},\
               git-ref=${{ github.ref_name }},\
               run-id=${{ github.run_id }},\
               repository=${{ github.repository }}"
          
          echo "✅ Reports uploaded to $S3_PATH"

        # ── 6. Upload artifacts for in-GitHub viewing ──────────────────────────
      - name: Upload Checkov reports as GitHub artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: checkov-reports-${{ github.run_id }}
          path: ${{ steps.checkov.outputs.report_dir }}
          retention-days: 30

        # ── 7. Fail the job if Checkov found violations ────────────────────────
      - name: Evaluate Checkov exit code
        if: steps.checkov.outcome == 'failure'
        run: |
          echo "❌ Checkov detected policy violations. Review the uploaded reports."
          exit 1
